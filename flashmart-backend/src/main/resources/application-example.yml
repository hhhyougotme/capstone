spring:
  application:
    name: flashmart-backend
  datasource:
    url: jdbc:mysql://localhost:3306/flashmart?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: YOUR_MYSQL_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

flashmart:
  cache:
    double-delete-delay-ms: 400
  auth:
    token-header: Authorization
    token-prefix: "Bearer "
    redis-key-prefix: "flashmart:session:"
    token-ttl-hours: 168
  streams:
    enabled: true
    poll-ms: 800
